name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version # reuse the pinned Node 22 — no drift with local
          cache: npm

      - name: Install dependencies
        run: npm ci # deterministic install from package-lock

      # ---- Layer 1: static analysis (fail-fast, cheapest first) ----
      - name: Type check
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check

      # ---- Layer 2: unit / component ----
      - name: Unit & component tests
        run: npm test

      # ---- Layer 3: build (needed by the E2E preview server) ----
      - name: Build
        run: npm run build

      # ---- Layer 4 + 5a: E2E + accessibility (Playwright previews the build) ----
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: End-to-end & accessibility tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ---- Layer 5b: Lighthouse performance budgets (advisory) ----
  # Separate job so a warn-level perf regression never blocks the merge gate,
  # and so it can run in parallel with the test job.
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI
        run: npm run test:lighthouse
      - name: Upload Lighthouse reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report/
          retention-days: 14
